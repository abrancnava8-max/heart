<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>I Miss You</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
    }
    #canvas {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      display: block;
    }

    /* ── Texto neón "I miss you" ── */
    #neon-overlay {
      position: fixed;
      bottom: 7%;
      width: 100%;
      text-align: center;
      pointer-events: none;
      z-index: 10;
      opacity: 0;
      animation: fadeInText 3s ease-out 2.5s forwards;
    }
    @keyframes fadeInText {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .neon-text {
      font-size: clamp(2rem, 6vw, 4.8rem);
      letter-spacing: 0.18em;
      font-weight: 300;
      color: #fff;
      text-transform: uppercase;
      font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, serif;
      text-shadow:
        0 0 4px  #fff,
        0 0 10px #fff,
        0 0 22px #ff4d94,
        0 0 45px #ff4d94,
        0 0 85px #ff1a6e,
        0 0 130px #ff1a6e,
        0 0 170px #c0006e;
      animation: neonFlicker 5s ease-in-out infinite alternate,
                 pulseGlow   3s ease-in-out infinite;
    }
    .neon-sub {
      margin-top: 0.5em;
      font-size: clamp(0.55rem, 1.4vw, 1rem);
      letter-spacing: 0.55em;
      color: rgba(255,170,210,0.5);
      text-transform: uppercase;
      font-weight: 100;
      font-family: 'Palatino Linotype', serif;
      text-shadow: 0 0 10px rgba(255,80,150,0.5), 0 0 25px rgba(255,40,120,0.25);
      animation: pulseGlow 4s ease-in-out infinite reverse;
    }
    @keyframes neonFlicker {
      0%,93%,100% {
        text-shadow: 0 0 4px #fff, 0 0 10px #fff, 0 0 22px #ff4d94,
          0 0 45px #ff4d94, 0 0 85px #ff1a6e, 0 0 130px #ff1a6e, 0 0 170px #c0006e;
      }
      94% { text-shadow: 0 0 2px #fff, 0 0 5px #ff4d94, 0 0 18px #ff1a6e; }
      95% { text-shadow: 0 0 4px #fff, 0 0 10px #fff, 0 0 22px #ff4d94, 0 0 45px #ff4d94; }
    }
    @keyframes pulseGlow { 0%,100%{opacity:1;} 50%{opacity:0.8;} }

    /* Viñeta cinematográfica */
    #vignette {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 5;
      background: radial-gradient(ellipse at center,
        transparent 35%, rgba(0,0,0,0.5) 70%, rgba(0,0,0,0.9) 100%);
    }

    /* Loader */
    #loader {
      position: fixed; inset: 0; background: #000; z-index: 100;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 1rem; transition: opacity 1.2s ease;
    }
    #loader.hidden { opacity: 0; pointer-events: none; }
    .loader-dot {
      width: 6px; height: 6px; border-radius: 50%; background: #ff4d94;
      display: inline-block;
      animation: dotBounce 1.2s ease-in-out infinite;
      box-shadow: 0 0 10px #ff4d94, 0 0 20px #ff1a6e;
    }
    .loader-dot:nth-child(2){animation-delay:.2s;}
    .loader-dot:nth-child(3){animation-delay:.4s;}
    @keyframes dotBounce{0%,80%,100%{transform:scale(1);opacity:.5;}40%{transform:scale(1.6);opacity:1;}}
    .loader-label{color:rgba(255,150,190,.5);font-size:.7rem;letter-spacing:.4em;text-transform:uppercase;font-family:sans-serif;}
  </style>
</head>
<body>

<div id="loader">
  <div style="display:flex;gap:10px">
    <span class="loader-dot"></span>
    <span class="loader-dot"></span>
    <span class="loader-dot"></span>
  </div>
  <p class="loader-label">Loading experience</p>
</div>

<canvas id="canvas"></canvas>
<div id="vignette"></div>

<div id="neon-overlay">
  <div class="neon-text">I miss you</div>
  <div class="neon-sub">always &nbsp;&bull;&nbsp; forever</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
(function () {
  'use strict';

  // =====================================================
  // CONFIGURACIÓN GLOBAL
  // =====================================================
  const HEART_PARTICLES  = 12000;  // partículas en la silueta del corazón
  const SHELL_RATIO      = 0.78;   // % de partículas en el borde (silueta visible)
  const INNER_RATIO      = 0.22;   // % de partículas en el interior (relleno suave)
  const AMBIENT_COUNT    = 900;    // partículas flotantes de ambiente
  const HEART_SCALE      = 3.6;    // tamaño del corazón
  const CAM_Z            = 9.5;    // distancia de cámara

  // =====================================================
  // SETUP RENDERER + ESCENA + CÁMARA
  // =====================================================
  const canvas   = document.getElementById('canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.3;

  const scene = new THREE.Scene();
  scene.fog   = new THREE.FogExp2(0x000000, 0.03);

  const camera = new THREE.PerspectiveCamera(52, window.innerWidth / window.innerHeight, 0.1, 200);
  camera.position.set(0, 0.3, CAM_Z);

  // =====================================================
  // FÓRMULA PARAMÉTRICA 2D DEL CORAZÓN
  // La ecuación clásica del corazón: da la silueta perfecta
  //   x = 16 sin³(t)
  //   y = 13cos(t) - 5cos(2t) - 2cos(3t) - cos(4t)
  // Normalizada a rango [-1, 1]
  // =====================================================
  function heartPoint2D(t) {
    const x = 16 * Math.pow(Math.sin(t), 3);
    const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
    return { x: x / 16, y: y / 13 }; // normalizado
  }

  // =====================================================
  // GENERACIÓN DE PARTÍCULAS
  // Estrategia: 78% en el borde (contorno), 22% interior
  // El borde define claramente la FORMA del corazón
  // El interior da volumen y profundidad sin opacar el contorno
  // =====================================================
  const totalPos  = new Float32Array(HEART_PARTICLES * 3);
  const totalCol  = new Float32Array(HEART_PARTICLES * 3);
  const totalSize = new Float32Array(HEART_PARTICLES);
  const totalOff  = new Float32Array(HEART_PARTICLES);

  const BORDER_COUNT = Math.floor(HEART_PARTICLES * SHELL_RATIO);
  const INNER_COUNT  = HEART_PARTICLES - BORDER_COUNT;

  // Colores
  const cCore   = new THREE.Color(1.0,  0.1,  0.35);  // rosa caliente
  const cMid    = new THREE.Color(1.0,  0.0,  0.55);  // magenta
  const cEdge   = new THREE.Color(0.7,  0.0,  0.85);  // violeta borde
  const cInner  = new THREE.Color(0.85, 0.05, 0.4);   // rosa interior suave

  // ── BORDE: partículas a lo largo del contorno 2D del corazón ──
  // Con pequeña variación en Z para dar profundidad 3D
  for (let i = 0; i < BORDER_COUNT; i++) {
    // Ángulo paramétrico (muestreo denso con pequeño jitter para look orgánico)
    const t      = (i / BORDER_COUNT) * Math.PI * 2 + (Math.random() - 0.5) * 0.015;
    const pt     = heartPoint2D(t);

    // Variación radial: algunas partículas ligeramente fuera/dentro del contorno
    // → da grosor al borde, más visible
    const radVar = (Math.random() - 0.5) * 0.055;
    const nx     = pt.x + radVar * Math.cos(t);
    const ny     = pt.y + radVar * Math.sin(t);

    // Profundidad Z: forma de domo suave basada en X (corazón con volumen)
    const zDepth = (1 - pt.x * pt.x * 0.6) * 0.4 * (Math.random() * 0.5 + 0.5);
    const nz     = zDepth * (Math.random() < 0.5 ? 1 : -1) * 0.3;

    totalPos[i*3]   = nx * HEART_SCALE;
    totalPos[i*3+1] = ny * HEART_SCALE;
    totalPos[i*3+2] = nz * HEART_SCALE;

    // Color: varía por posición en el contorno — top brillante, base más cálida
    const colorT = (Math.sin(t) * 0.5 + 0.5); // 0=top, 1=bottom
    const col    = new THREE.Color().lerpColors(cMid, cCore, colorT);
    if (colorT < 0.3) col.lerpColors(cEdge, cMid, colorT / 0.3);

    totalCol[i*3]   = col.r;
    totalCol[i*3+1] = col.g;
    totalCol[i*3+2] = col.b;

    // Borde: partículas más grandes y brillantes
    totalSize[i] = 0.06 + Math.random() * 0.055;
    totalOff[i]  = Math.random() * Math.PI * 2;
  }

  // ── INTERIOR: relleno suave dentro del corazón ──
  // Usa rejection sampling con la función implícita 2D del corazón:
  // (x²+y²-1)³ ≤ x²·y³   (normalizada, escala propia)
  function insideHeart2D(x, y) {
    // Ajustamos a escala donde el corazón ocupa ±1 aprox
    const px = x;
    const py = y - 0.1; // centrar verticamente
    const a  = px*px + py*py - 1;
    return a*a*a - px*px * py*py*py <= 0;
  }

  let filled = 0;
  let tries  = 0;
  while (filled < INNER_COUNT && tries < INNER_COUNT * 40) {
    tries++;
    const rx = (Math.random() - 0.5) * 2.0;
    const ry = (Math.random() - 0.5) * 2.2 + 0.1;
    if (!insideHeart2D(rx, ry)) continue;

    const idx  = BORDER_COUNT + filled;
    const dist = Math.sqrt(rx*rx + ry*ry);
    const t    = Math.min(dist / 1.0, 1.0);

    // Interior: profundidad Z basada en cuán lejos del borde está
    const zMax = (1 - t) * 0.5;
    const nz   = (Math.random() - 0.5) * zMax;

    totalPos[idx*3]   = rx * HEART_SCALE;
    totalPos[idx*3+1] = ry * HEART_SCALE * 0.95;
    totalPos[idx*3+2] = nz * HEART_SCALE;

    // Interior más oscuro/suave para no competir con el borde
    const brightness = 0.35 + (1 - t) * 0.3;
    totalCol[idx*3]   = cInner.r * brightness;
    totalCol[idx*3+1] = cInner.g * brightness;
    totalCol[idx*3+2] = cInner.b * brightness;

    // Interior: partículas más pequeñas y tenues
    totalSize[idx] = 0.022 + Math.random() * 0.03 * (1 - t * 0.6);
    totalOff[idx]  = Math.random() * Math.PI * 2;
    filled++;
  }

  // =====================================================
  // SHADER MATERIAL — Partículas suaves con glow aditivo
  // =====================================================
  const heartMat = new THREE.ShaderMaterial({
    uniforms: {
      uTime      : { value: 0 },
      uPixelRatio: { value: renderer.getPixelRatio() },
    },
    vertexShader: /* glsl */`
      attribute float aSize;
      attribute float aOffset;
      attribute vec3  aColor;
      varying   vec3  vColor;
      uniform   float uTime;
      uniform   float uPixelRatio;

      void main() {
        vColor = aColor;
        vec3 pos = position;

        // Micro-flotación orgánica individual
        float wave = sin(uTime * 1.1 + aOffset)      * 0.016
                   + cos(uTime * 0.65 + aOffset*1.4) * 0.010;
        pos += normalize(pos + 0.001) * wave;

        vec4 mvPos  = modelViewMatrix * vec4(pos, 1.0);
        gl_Position = projectionMatrix * mvPos;

        // Tamaño perspectiva real
        gl_PointSize = aSize * uPixelRatio * (300.0 / -mvPos.z);
        gl_PointSize = clamp(gl_PointSize, 1.0, 14.0);
      }
    `,
    fragmentShader: /* glsl */`
      varying vec3 vColor;
      void main() {
        vec2  uv   = gl_PointCoord - 0.5;
        float d    = length(uv);
        if (d > 0.5) discard;

        // Núcleo brillante + halo suave
        float core  = 1.0 - smoothstep(0.0,  0.18, d);
        float halo  = 1.0 - smoothstep(0.18, 0.5,  d);
        float alpha = core * 0.9 + halo * 0.55;

        // Boost de brillo en el núcleo
        vec3 col = vColor * (1.0 + core * 1.2);
        gl_FragColor = vec4(col, alpha);
      }
    `,
    transparent: true,
    depthWrite : false,
    blending   : THREE.AdditiveBlending,
  });

  const heartGeo = new THREE.BufferGeometry();
  heartGeo.setAttribute('position', new THREE.BufferAttribute(totalPos,  3));
  heartGeo.setAttribute('aColor',   new THREE.BufferAttribute(totalCol,  3));
  heartGeo.setAttribute('aSize',    new THREE.BufferAttribute(totalSize, 1));
  heartGeo.setAttribute('aOffset',  new THREE.BufferAttribute(totalOff,  1));

  const heartMesh = new THREE.Points(heartGeo, heartMat);
  scene.add(heartMesh);

  // =====================================================
  // PARTÍCULAS AMBIENTALES — polvo de luz flotante
  // =====================================================
  const ambPos  = new Float32Array(AMBIENT_COUNT * 3);
  const ambCol  = new Float32Array(AMBIENT_COUNT * 3);
  const ambSz   = new Float32Array(AMBIENT_COUNT);
  const ambOff  = new Float32Array(AMBIENT_COUNT);

  for (let i = 0; i < AMBIENT_COUNT; i++) {
    const r     = 5 + Math.random() * 10;
    const theta = Math.random() * Math.PI * 2;
    const phi   = Math.acos(2 * Math.random() - 1);
    ambPos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    ambPos[i*3+1] = r * Math.sin(phi) * Math.sin(theta) * 0.55;
    ambPos[i*3+2] = r * Math.cos(phi);

    const b = 0.2 + Math.random() * 0.45;
    ambCol[i*3]   = 0.9 * b;
    ambCol[i*3+1] = 0.25 * b;
    ambCol[i*3+2] = 0.65 * b;

    ambSz[i]  = 0.012 + Math.random() * 0.022;
    ambOff[i] = Math.random() * Math.PI * 2;
  }

  const ambMat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 }, uPixelRatio: { value: renderer.getPixelRatio() } },
    vertexShader: /* glsl */`
      attribute float aSize; attribute float aOffset; attribute vec3 aColor;
      varying vec3 vColor;
      uniform float uTime; uniform float uPixelRatio;
      void main() {
        vColor = aColor;
        vec3 pos = position;
        pos.y += sin(uTime * 0.28 + aOffset) * 0.3;
        pos.x += cos(uTime * 0.19 + aOffset * 0.9) * 0.18;
        vec4 mvPos = modelViewMatrix * vec4(pos, 1.0);
        gl_Position = projectionMatrix * mvPos;
        gl_PointSize = aSize * uPixelRatio * (220.0 / -mvPos.z);
        gl_PointSize = clamp(gl_PointSize, 0.5, 4.0);
      }
    `,
    fragmentShader: /* glsl */`
      varying vec3 vColor;
      void main() {
        vec2 uv = gl_PointCoord - 0.5;
        float d = length(uv);
        if (d > 0.5) discard;
        float a = pow(1.0 - d * 2.0, 2.2);
        gl_FragColor = vec4(vColor, a * 0.6);
      }
    `,
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
  });

  const ambGeo = new THREE.BufferGeometry();
  ambGeo.setAttribute('position', new THREE.BufferAttribute(ambPos, 3));
  ambGeo.setAttribute('aColor',   new THREE.BufferAttribute(ambCol, 3));
  ambGeo.setAttribute('aSize',    new THREE.BufferAttribute(ambSz,  1));
  ambGeo.setAttribute('aOffset',  new THREE.BufferAttribute(ambOff, 1));
  scene.add(new THREE.Points(ambGeo, ambMat));

  // =====================================================
  // HALO VOLUMÉTRICO — resplandor detrás del corazón
  // =====================================================
  const haloMat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 }, uColor: { value: new THREE.Color(0.85, 0.03, 0.38) } },
    vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
    fragmentShader: /* glsl */`
      uniform vec3 uColor; uniform float uTime; varying vec2 vUv;
      void main(){
        vec2 c = vUv - 0.5;
        // Forma elíptica vertical que acompaña la forma del corazón
        c.y *= 0.85;
        float d = length(c);
        float p = 0.5 + 0.5*sin(uTime * 1.5);
        float h = smoothstep(0.5, 0.0, d) * 0.18 * (0.65 + 0.35*p);
        gl_FragColor = vec4(uColor, h);
      }
    `,
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending, side: THREE.DoubleSide,
  });
  const haloMesh = new THREE.Mesh(new THREE.PlaneGeometry(16, 16), haloMat);
  haloMesh.position.z = -1.5;
  scene.add(haloMesh);

  // =====================================================
  // INTERACCIÓN MOUSE / TOUCH — parallax suave
  // =====================================================
  const mouse = { x: 0, y: 0 };
  document.addEventListener('mousemove', e => {
    mouse.x = (e.clientX / window.innerWidth  - 0.5) * 2;
    mouse.y = (e.clientY / window.innerHeight - 0.5) * 2;
  });
  document.addEventListener('touchmove', e => {
    mouse.x = (e.touches[0].clientX / window.innerWidth  - 0.5) * 2;
    mouse.y = (e.touches[0].clientY / window.innerHeight - 0.5) * 2;
  }, { passive: true });

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // =====================================================
  // LOADER
  // =====================================================
  setTimeout(() => {
    document.getElementById('loader').classList.add('hidden');
    setTimeout(() => document.getElementById('loader').style.display = 'none', 1400);
  }, 700);

  // =====================================================
  // LOOP DE ANIMACIÓN — 60 FPS
  // =====================================================
  const clock = new THREE.Clock();
  let time    = 0;

  function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();
    time += delta;

    heartMat.uniforms.uTime.value = time;
    ambMat.uniforms.uTime.value   = time;
    haloMat.uniforms.uTime.value  = time;

    // ── Latido lub-dub ──
    const beat1 = Math.max(0, Math.sin(time * 2.1))       * 0.55;
    const beat2 = Math.max(0, Math.sin(time * 2.1 - 0.55)) * 0.28;
    const pulse = 1.0 + (beat1 + beat2) * 0.055;
    heartMesh.scale.setScalar(pulse);

    // ── Balanceo suave (sin rotación en Y — corazón de frente) ──
    heartMesh.rotation.x = Math.sin(time * 0.32) * 0.035;
    heartMesh.rotation.z = Math.sin(time * 0.21) * 0.018;
    heartMesh.rotation.y = 0;

    // ── Cámara: parallax con mouse, sin órbita ──
    const tx =  mouse.x * 0.9;
    const ty = -mouse.y * 0.55 + Math.sin(time * 0.1) * 0.2;
    camera.position.x += (tx - camera.position.x) * 0.04;
    camera.position.y += (ty + 0.3 - camera.position.y) * 0.04;
    camera.position.z += (CAM_Z - camera.position.z) * 0.04;
    camera.lookAt(0, 0.15, 0);

    renderer.render(scene, camera);
  }
  animate();

})();
</script>
</body>
</html>
